name: Content quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate static content
        run: python scripts/generate_aca_articles.py
      - name: Audit SEO and AdSense checklist
        run: python scripts/audit_seo_adsense.py --write-report
      - name: Audit performance budget
        run: python scripts/audit_performance_budget.py --write-report
      - name: Validate generated site
        run: python scripts/validate_content_quality.py --write-report
      - name: Write production readiness report
        run: python scripts/production_readiness_audit.py --write-report
      - name: Ensure generated artifacts are committed
        run: git diff --exit-code -- . ":(exclude)reports/*.json"
